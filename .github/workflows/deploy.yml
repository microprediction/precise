name: deploy

on:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Verify the release tag matches the package version
      run: |
        VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
        TAG="${{ github.event.release.tag_name }}"
        echo "pyproject version=$VERSION  release tag=$TAG"
        test "v$VERSION" = "$TAG" || { echo "::error::tag '$TAG' != 'v$VERSION' — refusing to publish"; exit 1; }
    - name: Build (pyproject / hatchling)
      run: |
        python -m pip install --upgrade pip build twine
        python -m build
    - name: Check artifacts
      run: twine check --strict dist/*
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
        TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      run: twine upload --non-interactive dist/*
