name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check precise tests research/bakeoff.py research/__init__.py
      - name: Type check
        run: mypy precise
      - name: Test
        run: pytest

  test-minimal:
    # Verify the package imports and the full test suite passes with numpy only
    # (no pandas, no scikit-learn) — the lean-install promise.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (numpy-only core + pytest)
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest
      - name: Import without optional deps
        run: python -c "import precise; print(precise.estimator_names())"
      - name: Test
        run: pytest
